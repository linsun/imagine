apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: quiet-bison
spec:
  ports:
    - name: http
      port: 3306
      targetPort: 3306
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: inventory  # must match the Service name
  namespace: quiet-bison
subsets:
  - addresses:
      - ip: 203.0.113.55
    ports:
      - name: http
        port: 3306
        protocol: TCP
