server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large image uploads / captures.
    client_max_body_size 25m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + generated images to the backend service.
    location /api/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_set_header Host $host;
        # Video generation (Veo) is long-running; allow up to ~16 minutes.
        proxy_read_timeout 960s;
        proxy_send_timeout 960s;
    }

    location /outputs/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_set_header Host $host;
    }
}
