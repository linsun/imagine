apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: demo-httproute
spec:
  parentRefs:
  - name: demo-gateway
  rules:
  - backendRefs:
    - name: frontend-v2
      port: 80
      weight: 80
    - name: frontend
      port: 80
      weight: 20
    matches:
    - path:
        type: Prefix
        value: "/"
