apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: default
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: default
  rules:
    - backendRefs:
        - name: frontend-v2
          port: 80
          weight: 80
        - name: frontend
          port: 80
          weight: 20
