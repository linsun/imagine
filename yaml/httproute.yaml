apiVersion: gateway.networking.k8s.io/v1alpha2
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
  - name: frontend-gateway
  rules:
  - matches:
    - path:
        type: Prefix
        value: "/"
    backendRefs:
    - name: frontend-v2
      port: 80
      weight: 80
    - name: frontend
      port: 80
      weight: 20
