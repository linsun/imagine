apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-v2
  labels:
    app: frontend-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-v2
  template:
    metadata:
      labels:
        app: frontend-v2
    spec:
      containers:
      - name: frontend-v2
        image: linsun/vision-frontend:kcdperu
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: VISION_BACKEND_ENDPOINT
          value: http://backend.demo.svc.cluster.local:8080
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-v2
  labels:
    app: frontend-v2
spec:
  selector:
    app: frontend-v2
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
