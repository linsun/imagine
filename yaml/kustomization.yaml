apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: secret is created separately by scripts/deploy.sh (from .env) or by
# copying secret.example.yaml -> secret.yaml. Ingress is optional; uncomment
# the line below if you have an ingress controller installed.
resources:
  - mcp-server.yaml
  - backend.yaml
  - frontend.yaml
  - frontend-v2.yaml
  - gateway.yaml
  - httproute.yaml
