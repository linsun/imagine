apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-mcp
  namespace: default
  labels:
    app: vision-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-mcp
  template:
    metadata:
      labels:
        app: vision-mcp
    spec:
      containers:
        - name: vision-mcp
          image: linsun/vision-mcp:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MCP_PORT
              value: "8000"
            - name: IMAGE_MODEL
              value: "gemini-2.5-flash-image"
            - name: VIDEO_MODEL
              value: "veo-3.1-lite-generate-preview"
            - name: VIDEO_DURATION
              value: "6"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: GEMINI_API_KEY
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: vision-mcp
  namespace: default
spec:
  selector:
    app: vision-mcp
  ports:
    - port: 8000
      targetPort: 8000
